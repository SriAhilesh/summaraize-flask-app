<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SummarAIze</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title mb-3">AI-Powered Notes Summarizer</h3>
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <div class="alert alert-warning">
                {{ messages[0] }}
              </div>
            {% endif %}
          {% endwith %}
          <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label for="text_input" class="form-label">Paste your notes here</label>
              <textarea class="form-control" id="text_input" name="text_input" rows="8" placeholder="Paste text..."></textarea>
            </div>
            <div class="mb-3">
              <label for="file" class="form-label">Or upload a .txt file</label>
              <input class="form-control" type="file" id="file" name="file" accept=".txt">
            </div>
            <div class="d-flex justify-content-between">
              <button type="submit" class="btn btn-primary">Summarize</button>
              <a class="btn btn-outline-secondary" href="/">Reset</a>
            </div>
          </form>
          <hr/>
          <p class="small text-muted">Get Your Texts Summarized in Seconds.</p>
        </div>
      </div>
      <p class="text-center mt-3 text-muted">Built with Flask • Deploy on AWS EC2 + S3</p>
    </div>
  </div>
</div>
</body>
</html>
